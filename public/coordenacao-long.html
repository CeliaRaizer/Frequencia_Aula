<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <title>Coordenação - Long Polling</title>

    <!-- Conecta o CSS -->
    <link rel="stylesheet" href="/style.css">
</head>
<body>

    <div class="container">
        <h2>Coordenação - Long Polling</h2>
        <ul id="lista"></ul>
    </div>

<script>
    async function fetchDiario() {
        try {
            const res = await fetch("/diario");
            const dados = await res.json();
            render(dados);
        } catch (err) {
            console.log("Erro ao buscar diário");
        }

    }

    async function escutar() {
        try {
            const res = await fetch("/long-poll");
            const dados = await res.json();

            if (!dados.timeout) {
                render(dados);
                console.log("Atualizado via long polling");
            }

        } catch (err) {
            console.log("Erro, tentando novamente...");
            await new Promise(r => setTimeout(r, 2000));
        }

        escutar();
    }

    function render(diario) {
        const dataHoje = new Date().toISOString().split("T")[0];
        const lista = document.getElementById("lista");
        lista.innerHTML = "";

        if (!diario.aulas) return;

        const aula = diario.aulas.find(a => a.data === dataHoje);
        if (!aula) return;

        diario.alunos.forEach(aluno => {
            const status = aula.presencas[aluno.matricula] || "Não marcado";

            const classe =
                status === "Presente" ? "presente" :
                status === "Ausente" ? "ausente" :
                "nao-marcado";

            lista.innerHTML += `
                <li class="${classe}">
                    ${aluno.nome} - ${status}
                </li>
            `;
        });
    }

    window.addEventListener("load", () => {
        fetchDiario();
        escutar();
    });
</script>

</body>
</html>
