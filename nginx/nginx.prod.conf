#docker compose exec nginx nginx -s reload
server{
    listen 80;
    server_name _;
    # 301: redirect
    return 301 https://$host$request_uri;
}

server{
    listen 443 ssl;
    server_name _;

    ssl_certificate /etc/nginx/certs/cert.pem;
    ssl_certificate_key /etc/nginx/certs/key.pem
    ssl_protocols 

    location / {
        proxy_pass http://app:3000;
    }
}