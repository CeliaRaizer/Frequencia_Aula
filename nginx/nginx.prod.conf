# https://github.com/fabricioifc/registro-frequencia-aula

events {
    worker_connections 1024;
}

http {
    include /etc/nginx/mime.types;
    default_type application/octet-stream;

    # Compressão para melhorar a performance
    gzip on;
    gzip_types text/plain text/css text/javascript application/javascript application/json image/svg+xml;

    # Configuração para WebSockets
    map $http_upgrade $connection_upgrade {
        default upgrade;
        '' close;
    }

    # --- 1. CONFIGURAÇÃO DE BACKUP ---
    upstream app_servers {
        server app:3000 max_fails=3 fail_timeout=10s;
        server app_backup:3000 backup; # Servidor de contingência
        keepalive 16; # Permite conexões persistentes para melhorar a performance com WebSockets
    }

    server {
        listen 80;
        server_name _;
        return 301 https://$host$request_uri;
    }

    server {
        listen 443 ssl;
        server_name _;

        ssl_certificate /etc/nginx/certs/cert.pem;
        ssl_certificate_key /etc/nginx/certs/key.pem;
        ssl_protocols TLSv1.2 TLSv1.3;

        # --- 2. GESTÃO DE ERROS CUSTOMIZADOS ---
        error_page 404 /404.html;
        error_page 500 502 503 504 /error.html;

        # Localização dos arquivos de erro (devem estar no diretório root do nginx)
        location = /404.html {
            root /usr/share/nginx/html;
            internal;
        }

        location = /error.html {
            root /usr/share/nginx/html;
            internal;
        }

        # Proxy para a aplicação
        location / {
            proxy_pass http://app_servers;
            proxy_http_version 1.1;

            # CRITICAL: Permite que o Nginx use as error_pages acima
            # se o backend retornar erro ou estiver offline
            proxy_intercept_errors on;

            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection $connection_upgrade;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }

        # Cache para arquivos estáticos
        location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff|woff2|ttf|eot)$ {
            proxy_pass http://app_servers;
            proxy_intercept_errors on;
            proxy_set_header Host $host;
            expires 1h;
            add_header Cache-Control "public, no-cache";
        }
    }
}