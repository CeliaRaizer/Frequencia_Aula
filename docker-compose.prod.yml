services:
  app: &app_base
    build:
      context: .
      dockerfile: Dockerfile.prod
    container_name: rf-app-prod
    environment:
      - NODE_ENV=production
      - PORT=3000
    networks:
      - prod-network
    restart: always
    healthcheck:
      test: ["CMD", "node", "-e", "require('http').get('http://localhost:3000/health', res => process.exit(res.statusCode === 200 ? 0 : 1))"]
      interval: 5s
      timeout: 3s
      retries: 2
  

  app_backup:
    <<: *app_base
    container_name: rf-app-backup-prod
    ports:
      - "3001:3000"
  nginx:
    image: nginx:latest
    container_name: rf-nginx-prod
    ports:
      - "80:80"
      - "443:443"
    volumes:
      # - ./nginx/nginx.prod.conf:/etc/nginx/conf.d/default.conf:ro
      - ./nginx/nginx.prod.conf:/etc/nginx/nginx.conf:ro
      - ./nginx/certs:/etc/nginx/certs
      - ./nginx/pages:/usr/share/nginx/html:ro
    depends_on:
      app:
        condition: service_healthy
      app_backup:
        condition: service_healthy

    networks:
      - prod-network
    restart: always

networks:
  prod-network:
    driver: bridge