services:
  app:
    build:
      context: .
      dockerfile: Dockerfile.dev
    container_name: registro-frequencia-dev
    # vamos usar nginx para servir a aplicação, então não precisamos expor a porta do app diretamente
    # ports:
    #   - "3000:3000" # externa:interna
    volumes:
      - .:/app
      - /app/node_modules # somente modo dev
    environment:
      - NODE_ENV=development
      - PORT=3000
    networks:
      - dev-network
    restart: unless-stopped

  nginx:
    image: nginx:latest
    container_name: nginx-dev
    ports:
      - "80:80"
    volumes:
      - ./nginx/nginx.dev.conf:/etc/nginx/conf.d/default.conf
    depends_on:
      - app
    networks:
      - dev-network
    restart: unless-stopped

networks:
  dev-network:
    driver: bridge